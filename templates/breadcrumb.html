{% if page.ancestors | length >= 2 %}
{% set parts = page.path | trim_start_matches(pat="/") | split(pat="/") %}
<nav aria-label="breadcrumb">
  <ul class="breadcrumb">
    <li><a href="/">Home</a></li>
    {% if parts | length >= 2 %}
    <li><a href="/{{ parts[0] | safe }}/">{{ parts[0] }}</a></li>
    {% endif %}
    {% if page.date %}
    <li>{{ page.date | date(format="%d %b %Y") }}</li>
    {% endif %}
  </ul>
</nav>
{% endif %}
