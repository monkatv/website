<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="color-scheme" content="dark light">
  <!-- Firefox can paint between external CSS load and script execution,
       causing a flash. This inline style provides instant background+text
       using OS preference as a best-guess until the theme script and
       external CSS take over. Keep colors in sync with custom.css. -->
  <style>
    html { background: #0d1117; color: #e6edf3; }
    @media (prefers-color-scheme: light) { html { background: #ffffff; color: #1f2328; } }
  </style>
  <link rel="stylesheet" href="/css/custom.css">
  <script>
    (function() {
      var theme = localStorage.getItem('theme') ||
        (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
      document.documentElement.style.colorScheme = theme;
      window.formatNumbers = function() {
        document.querySelectorAll('[data-fmt]').forEach(function(el) {
          var v = Number(el.getAttribute('data-fmt'));
          if (!isNaN(v)) el.textContent = v.toLocaleString();
        });
      };
      window.toggleTheme = function() {
        var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        document.documentElement.style.colorScheme = next;
        localStorage.setItem('theme', next);
      };
    })();
  </script>
  <title>{% block title %}{{ config.title }}{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{% block description %}Weekly Twitch chat statistics and emote usage tracking{% endblock %}">
  <meta property="og:title" content="{% block og_title %}{{ config.title }}{% endblock %}">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="en_US">
  <meta property="og:url" content="{% block og_url %}{{ config.base_url }}{% endblock %}">
  <meta property="og:site_name" content="{{ config.title }}">
  <meta property="og:description" content="{% block og_description %}Weekly Twitch chat statistics and emote usage tracking{% endblock %}">
  <meta property="og:image" content="{% block og_image %}/img/logo.png{% endblock %}">
  <link rel="canonical" href="{% block canonical %}{{ config.base_url }}{% endblock %}">
  <link rel="icon" href="/img/favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://cdn.7tv.app">
  <link rel="preconnect" href="https://cdn.betterttv.net">
  <link rel="preconnect" href="https://cdn.frankerfacez.com">
  <link rel="preconnect" href="https://static-cdn.jtvnw.net">
  <script defer src="/zk/js/script.js"></script>
  <script>
    window.plausible=window.plausible||function(){(plausible.q=plausible.q||[]).push(arguments)},plausible.init=plausible.init||function(i){plausible.o=i||{}};
    plausible.init({ endpoint: "/zk/api/event" })
  </script>
  {% block extra_head %}{% endblock %}
</head>
<body>
  {% include "header.html" %}
  {% block content %}{% endblock %}
  {% include "footer.html" %}
</body>
</html>
