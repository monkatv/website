name: Build & Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: taiki-e/install-action@v2
        with:
          tool: zola@0.22.1

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-tcs-${{ hashFiles('.github/workflows/ci.yml') }}

      - name: Check for new data files
        id: check-data
        run: |
          if git diff --name-only ${{ github.event.before }} ${{ github.sha }} -- 'static/api/*/20*.json' 'content/' 2>/dev/null | grep -q .; then
            echo "has_new_data=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install tcs
        if: steps.check-data.outputs.has_new_data || github.event_name == 'workflow_dispatch'
        run: pip install 'tcs @ git+https://${{ secrets.GH_ACCESS_TOKEN }}@github.com/monkatv/tcs.git'

      - name: Generate summary JSONs
        if: steps.check-data.outputs.has_new_data || github.event_name == 'workflow_dispatch'
        run: tcs summarize --dir static/api

      - run: zola build

      - name: Upload pages artifact
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Commit updated summaries to master
        if: github.ref == 'refs/heads/master' && steps.check-data.outputs.has_new_data
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add static/api/*/summary.json static/api/*/latest.json
          if ! git diff --cached --quiet; then
            git commit -m "Update streamer summaries"
            git pull --rebase
            git push
          fi

  deploy:
    needs: build
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
